<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <defs>
    <linearGradient id="heroBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3730a3"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="btnGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <filter id="phoneShadow">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
    <clipPath id="screenClip">
      <rect x="499" y="47" width="202" height="308" rx="18"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#heroBg)" rx="20"/>

  <!-- Subtle circles -->
  <circle cx="120" cy="80" r="180" fill="white" opacity="0.04"/>
  <circle cx="700" cy="350" r="200" fill="white" opacity="0.04"/>
  <circle cx="660" cy="60" r="80" fill="white" opacity="0.06"/>

  <!-- Left text block -->
  <text x="72" y="130" font-size="13" font-weight="600" fill="rgba(255,255,255,0.5)" letter-spacing="2">CHALLANSETU.COM</text>
  <text x="72" y="175" font-size="34" font-weight="900" fill="white" letter-spacing="-0.5">Check your</text>
  <text x="72" y="220" font-size="34" font-weight="900" fill="white" letter-spacing="-0.5">challan.</text>
  <text x="72" y="265" font-size="34" font-weight="900" fill="#a5f3fc" letter-spacing="-0.5">Pay less.</text>

  <rect x="72" y="285" width="3" height="50" rx="2" fill="rgba(255,255,255,0.2)"/>
  <text x="85" y="305" font-size="13" fill="rgba(255,255,255,0.65)">Dedicated lawyer assigned</text>
  <text x="85" y="325" font-size="13" fill="rgba(255,255,255,0.65)">100% money-back guarantee</text>

  <!-- Pill badges -->
  <rect x="72" y="350" width="130" height="28" rx="14" fill="rgba(255,255,255,0.12)"/>
  <text x="137" y="368" text-anchor="middle" font-size="11" fill="white" font-weight="600">Delhi NCR</text>

  <rect x="212" y="350" width="130" height="28" rx="14" fill="rgba(255,255,255,0.12)"/>
  <text x="277" y="368" text-anchor="middle" font-size="11" fill="white" font-weight="600">Up to 50% off</text>

  <!-- Phone body -->
  <rect x="488" y="28" width="224" height="348" rx="32" fill="#0f172a" filter="url(#phoneShadow)"/>
  <!-- Screen bezel -->
  <rect x="496" y="44" width="208" height="316" rx="22" fill="#1e293b"/>
  <!-- Screen -->
  <rect x="499" y="47" width="202" height="308" rx="18" fill="url(#screenGrad)"/>

  <!-- Screen content (clipped) -->
  <g clip-path="url(#screenClip)">
    <!-- Status bar -->
    <rect x="499" y="47" width="202" height="22" fill="#f8fafc"/>
    <text x="514" y="62" font-size="9" fill="#94a3b8">9:41</text>
    <text x="690" y="62" text-anchor="end" font-size="9" fill="#94a3b8">●●● WiFi</text>

    <!-- Nav bar -->
    <rect x="499" y="69" width="202" height="30" fill="white" opacity="0.9"/>
    <text x="600" y="88" text-anchor="middle" font-size="11" font-weight="800" fill="#4f46e5">ChallanSetu</text>

    <!-- Hero section -->
    <rect x="499" y="99" width="202" height="55" fill="#4f46e5"/>
    <text x="600" y="120" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.7)">Got a traffic challan?</text>
    <text x="600" y="138" text-anchor="middle" font-size="13" font-weight="800" fill="white">Settle &amp; Save 50%</text>

    <!-- Vehicle number input -->
    <text x="514" y="172" font-size="9" fill="#64748b" font-weight="600">VEHICLE NUMBER</text>
    <rect x="514" y="176" width="172" height="28" rx="7" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
    <text x="526" y="194" font-size="10" fill="#94a3b8">e.g. DL 1C AB 1234</text>

    <!-- CTA button -->
    <rect x="514" y="212" width="172" height="30" rx="8" fill="url(#btnGrad)"/>
    <text x="600" y="231" text-anchor="middle" font-size="10" font-weight="700" fill="white">Check Eligibility Free →</text>

    <!-- No payment badge -->
    <rect x="530" y="250" width="140" height="20" rx="6" fill="#f0fdf4"/>
    <text x="600" y="264" text-anchor="middle" font-size="9" fill="#16a34a" font-weight="600">✓ No payment to start</text>

    <!-- Stats row -->
    <rect x="514" y="278" width="52" height="44" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <text x="540" y="297" text-anchor="middle" font-size="13" font-weight="800" fill="#4f46e5">50%</text>
    <text x="540" y="311" text-anchor="middle" font-size="8" fill="#64748b">savings</text>

    <rect x="574" y="278" width="52" height="44" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <text x="600" y="297" text-anchor="middle" font-size="13" font-weight="800" fill="#4f46e5">5</text>
    <text x="600" y="311" text-anchor="middle" font-size="8" fill="#64748b">cities</text>

    <rect x="634" y="278" width="52" height="44" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <text x="660" y="295" text-anchor="middle" font-size="11" font-weight="800" fill="#4f46e5">100%</text>
    <text x="660" y="311" text-anchor="middle" font-size="8" fill="#64748b">guarantee</text>

    <!-- Bottom safe label -->
    <rect x="499" y="332" width="202" height="23" fill="#fefce8"/>
    <text x="600" y="347" text-anchor="middle" font-size="9" fill="#854d0e" font-weight="600">🔒 Safe &amp; 100% Legal Process</text>
  </g>

  <!-- Phone home indicator -->
  <rect x="561" y="378" width="78" height="4" rx="2" fill="#334155"/>
  <!-- Front camera -->
  <circle cx="600" cy="40" r="5" fill="#0f172a"/>
  <circle cx="600" cy="40" r="3" fill="#1e293b"/>
</svg>
