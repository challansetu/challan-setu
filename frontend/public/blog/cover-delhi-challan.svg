<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#312e81"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="pill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a5f3fc"/>
      <stop offset="100%" stop-color="#6ee7b7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg1)"/>

  <!-- Decorative circles -->
  <circle cx="650" cy="-40" r="220" fill="white" opacity="0.05"/>
  <circle cx="750" cy="500" r="180" fill="white" opacity="0.05"/>
  <circle cx="50" cy="400" r="140" fill="white" opacity="0.04"/>

  <!-- Dot pattern overlay -->
  <pattern id="dp1" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1" fill="white" opacity="0.08"/>
  </pattern>
  <rect width="800" height="450" fill="url(#dp1)"/>

  <!-- Category pill -->
  <rect x="60" y="60" width="130" height="28" rx="14" fill="white" opacity="0.12"/>
  <text x="125" y="79" text-anchor="middle" font-size="11" font-weight="700" fill="white" letter-spacing="1">CHALLAN GUIDE</text>

  <!-- Main headline -->
  <text x="60" y="148" font-size="42" font-weight="900" fill="white" letter-spacing="-0.5">Got a Traffic</text>
  <text x="60" y="200" font-size="42" font-weight="900" fill="white" letter-spacing="-0.5">Challan in Delhi?</text>

  <!-- Subtext -->
  <text x="60" y="244" font-size="17" fill="rgba(255,255,255,0.65)">Here's how to legally pay less</text>

  <!-- Divider -->
  <rect x="60" y="268" width="60" height="3" rx="2" fill="url(#pill)"/>

  <!-- Savings badge -->
  <rect x="60" y="295" width="200" height="72" rx="16" fill="white" opacity="0.1"/>
  <text x="160" y="328" text-anchor="middle" font-size="36" font-weight="900" fill="#a5f3fc">50%</text>
  <text x="160" y="352" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.7)">potential savings</text>

  <!-- Right visual — stylised rupee coin stack -->
  <circle cx="600" cy="225" r="110" fill="white" opacity="0.06"/>
  <circle cx="600" cy="225" r="85" fill="white" opacity="0.07"/>

  <!-- Coins -->
  <ellipse cx="600" cy="290" rx="70" ry="14" fill="#fbbf24"/>
  <rect x="530" y="270" width="140" height="20" rx="0" fill="#fbbf24"/>
  <ellipse cx="600" cy="270" rx="70" ry="14" fill="#fcd34d"/>

  <ellipse cx="600" cy="258" rx="70" ry="14" fill="#fbbf24"/>
  <rect x="530" y="238" width="140" height="20" rx="0" fill="#fbbf24"/>
  <ellipse cx="600" cy="238" rx="70" ry="14" fill="#fcd34d"/>

  <ellipse cx="600" cy="226" rx="70" ry="14" fill="#fbbf24"/>
  <rect x="530" y="206" width="140" height="20" rx="0" fill="#fbbf24"/>
  <ellipse cx="600" cy="206" rx="70" ry="14" fill="#fcd34d"/>

  <!-- Rupee symbol on top coin -->
  <text x="600" y="213" text-anchor="middle" font-size="18" font-weight="900" fill="#92400e">₹</text>

  <!-- Arrow cutting through coins -->
  <polygon points="680,195 710,225 680,255" fill="#a5f3fc" opacity="0.9"/>
  <rect x="595" y="218" width="85" height="14" rx="7" fill="#a5f3fc" opacity="0.9"/>

  <!-- Bottom tag -->
  <text x="60" y="415" font-size="12" fill="rgba(255,255,255,0.4)">challansetu.com</text>
</svg>
