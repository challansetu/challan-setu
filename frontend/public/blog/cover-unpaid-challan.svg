<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7f1d1d"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
    <linearGradient id="warnGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef08a"/>
      <stop offset="100%" stop-color="#fde047"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg2)"/>

  <!-- Noise / dot overlay -->
  <pattern id="dp2" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1" fill="white" opacity="0.06"/>
  </pattern>
  <rect width="800" height="450" fill="url(#dp2)"/>

  <!-- Decorative circles -->
  <circle cx="700" cy="-20" r="200" fill="white" opacity="0.04"/>
  <circle cx="80" cy="500" r="160" fill="white" opacity="0.04"/>

  <!-- Category pill -->
  <rect x="60" y="60" width="130" height="28" rx="14" fill="white" opacity="0.12"/>
  <text x="125" y="79" text-anchor="middle" font-size="11" font-weight="700" fill="white" letter-spacing="1">CHALLAN GUIDE</text>

  <!-- Main headline -->
  <text x="60" y="148" font-size="38" font-weight="900" fill="white" letter-spacing="-0.5">What Happens If</text>
  <text x="60" y="196" font-size="38" font-weight="900" fill="white" letter-spacing="-0.5">You Don't Pay?</text>

  <!-- Sub -->
  <text x="60" y="238" font-size="16" fill="rgba(255,255,255,0.6)">The real cost of ignoring a challan</text>

  <!-- Divider -->
  <rect x="60" y="260" width="60" height="3" rx="2" fill="#fde047"/>

  <!-- Consequence badges -->
  <rect x="60" y="285" width="220" height="34" rx="10" fill="rgba(255,255,255,0.1)"/>
  <text x="80" y="307" font-size="13" fill="white" font-weight="600">⚠ Licence suspension risk</text>

  <rect x="60" y="327" width="200" height="34" rx="10" fill="rgba(255,255,255,0.1)"/>
  <text x="80" y="349" font-size="13" fill="white" font-weight="600">⚠ RC renewal blocked</text>

  <rect x="60" y="369" width="215" height="34" rx="10" fill="rgba(255,255,255,0.1)"/>
  <text x="80" y="391" font-size="13" fill="white" font-weight="600">⚠ Fines keep growing</text>

  <!-- Right: Warning triangle -->
  <polygon points="600,110 730,330 470,330" fill="url(#warnGrad)" opacity="0.95"/>
  <!-- Inner triangle (hollow effect) -->
  <polygon points="600,155 700,310 500,310" fill="#b91c1c" opacity="0.4"/>
  <!-- Exclamation mark -->
  <rect x="590" y="190" width="20" height="80" rx="8" fill="#7f1d1d"/>
  <circle cx="600" cy="295" r="12" fill="#7f1d1d"/>

  <!-- Glow ring -->
  <circle cx="600" cy="220" r="140" fill="none" stroke="#fde047" stroke-width="1.5" opacity="0.2"/>
  <circle cx="600" cy="220" r="160" fill="none" stroke="#fde047" stroke-width="1" opacity="0.1"/>

  <!-- Bottom -->
  <text x="60" y="430" font-size="12" fill="rgba(255,255,255,0.35)">challansetu.com</text>
</svg>
