<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#064e3b"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="pill3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a5f3fc"/>
      <stop offset="100%" stop-color="#6ee7b7"/>
    </linearGradient>
  </defs>

  <rect width="800" height="450" fill="url(#bg3)"/>
  <circle cx="660" cy="-20" r="210" fill="white" opacity="0.05"/>
  <circle cx="720" cy="490" r="170" fill="white" opacity="0.04"/>

  <pattern id="dp3" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1" fill="white" opacity="0.07"/>
  </pattern>
  <rect width="800" height="450" fill="url(#dp3)"/>

  <!-- Category pill -->
  <rect x="60" y="60" width="140" height="28" rx="14" fill="white" opacity="0.12"/>
  <text x="130" y="79" text-anchor="middle" font-size="11" font-weight="700" fill="white" letter-spacing="1">SETTLEMENT GUIDE</text>

  <!-- Main headline -->
  <text x="60" y="148" font-size="42" font-weight="900" fill="white" letter-spacing="-0.5">What is</text>
  <text x="60" y="198" font-size="42" font-weight="900" fill="#6ee7b7" letter-spacing="-0.5">Lok Adalat?</text>
  <text x="60" y="244" font-size="20" fill="rgba(255,255,255,0.65)">Challan settlement explained</text>

  <rect x="60" y="265" width="60" height="3" rx="2" fill="url(#pill3)"/>

  <!-- Savings badge -->
  <rect x="60" y="292" width="200" height="72" rx="16" fill="white" opacity="0.1"/>
  <text x="160" y="325" text-anchor="middle" font-size="36" font-weight="900" fill="#6ee7b7">30–50%</text>
  <text x="160" y="349" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.7)">typical fine reduction</text>

  <!-- Right visual — scales of justice simplified -->
  <line x1="610" y1="130" x2="610" y2="320" stroke="rgba(255,255,255,0.3)" stroke-width="4"/>
  <line x1="530" y1="180" x2="690" y2="180" stroke="rgba(255,255,255,0.3)" stroke-width="4"/>
  <!-- Left pan -->
  <path d="M530,180 Q510,200 490,220 Q510,240 530,220 Q550,200 530,180" fill="none" stroke="#6ee7b7" stroke-width="3" opacity="0.8"/>
  <ellipse cx="510" cy="225" rx="30" ry="8" fill="#6ee7b7" opacity="0.3"/>
  <text x="510" y="229" text-anchor="middle" font-size="12" fill="#6ee7b7" opacity="0.9">₹ Fine</text>
  <!-- Right pan -->
  <path d="M690,180 Q710,200 730,220 Q710,240 690,220 Q670,200 690,180" fill="none" stroke="#a5f3fc" stroke-width="3" opacity="0.8"/>
  <ellipse cx="710" cy="225" rx="30" ry="8" fill="#a5f3fc" opacity="0.3"/>
  <text x="710" y="229" text-anchor="middle" font-size="10" fill="#a5f3fc" opacity="0.9">Settled</text>

  <!-- Gavel -->
  <rect x="575" y="310" width="70" height="20" rx="5" fill="rgba(255,255,255,0.2)" transform="rotate(-30,610,320)"/>
  <rect x="605" y="290" width="12" height="40" rx="4" fill="rgba(255,255,255,0.15)" transform="rotate(-30,610,320)"/>

  <text x="60" y="415" font-size="12" fill="rgba(255,255,255,0.4)">challansetu.com</text>
</svg>
