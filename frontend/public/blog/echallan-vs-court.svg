<svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <defs>
    <linearGradient id="leftGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="rightGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#fed7aa"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="380" fill="#f8fafc" rx="20"/>

  <!-- Title -->
  <text x="400" y="42" text-anchor="middle" font-size="15" font-weight="700" fill="#64748b" letter-spacing="1">KNOW YOUR CHALLAN TYPE</text>

  <!-- VS badge -->
  <circle cx="400" cy="210" r="28" fill="white" stroke="#e2e8f0" stroke-width="2"/>
  <text x="400" y="216" text-anchor="middle" font-size="14" font-weight="800" fill="#64748b">VS</text>

  <!-- ── LEFT CARD: E-Challan ── -->
  <rect x="40" y="65" width="320" height="295" rx="16" fill="white" stroke="#bfdbfe" stroke-width="2"/>
  <!-- Header band -->
  <rect x="40" y="65" width="320" height="70" rx="16" fill="url(#leftGrad)"/>
  <rect x="40" y="115" width="320" height="20" fill="url(#leftGrad)"/>
  <!-- Camera icon -->
  <rect x="171" y="80" width="50" height="36" rx="6" fill="#3b82f6"/>
  <circle cx="196" cy="98" r="10" fill="#eff6ff"/>
  <circle cx="196" cy="98" r="6" fill="#3b82f6"/>
  <rect x="189" y="77" width="14" height="7" rx="3" fill="#3b82f6"/>
  <circle cx="214" cy="84" r="3" fill="#93c5fd"/>
  <!-- Card title -->
  <text x="200" y="160" text-anchor="middle" font-size="20" font-weight="800" fill="#1e40af">E-Challan</text>
  <text x="200" y="180" text-anchor="middle" font-size="12" fill="#64748b">Camera / Police device</text>
  <!-- Divider -->
  <line x1="65" y1="198" x2="335" y2="198" stroke="#f1f5f9" stroke-width="1.5"/>
  <!-- Rows -->
  <text x="65" y="222" font-size="12" fill="#94a3b8">Pay online</text>
  <rect x="255" y="208" width="65" height="22" rx="6" fill="#dcfce7"/>
  <text x="287" y="223" text-anchor="middle" font-size="11" font-weight="700" fill="#16a34a">Yes ✓</text>

  <text x="65" y="257" font-size="12" fill="#94a3b8">Discount possible</text>
  <rect x="255" y="243" width="65" height="22" rx="6" fill="#dcfce7"/>
  <text x="287" y="258" text-anchor="middle" font-size="11" font-weight="700" fill="#16a34a">Yes ✓</text>

  <text x="65" y="292" font-size="12" fill="#94a3b8">Complexity</text>
  <rect x="255" y="278" width="65" height="22" rx="6" fill="#dcfce7"/>
  <text x="287" y="293" text-anchor="middle" font-size="11" font-weight="700" fill="#16a34a">Low</text>

  <text x="65" y="327" font-size="12" fill="#94a3b8">Needs lawyer</text>
  <rect x="245" y="313" width="75" height="22" rx="6" fill="#f1f5f9"/>
  <text x="282" y="328" text-anchor="middle" font-size="11" font-weight="700" fill="#64748b">Optional</text>

  <!-- Bottom tag -->
  <rect x="65" y="338" width="250" height="8" rx="4" fill="#bfdbfe" opacity="0.5"/>

  <!-- ── RIGHT CARD: Court Challan ── -->
  <rect x="440" y="65" width="320" height="295" rx="16" fill="white" stroke="#fed7aa" stroke-width="2"/>
  <!-- Header band -->
  <rect x="440" y="65" width="320" height="70" rx="16" fill="url(#rightGrad)"/>
  <rect x="440" y="115" width="320" height="20" fill="url(#rightGrad)"/>
  <!-- Gavel icon (simplified) -->
  <rect x="578" y="76" width="40" height="18" rx="5" fill="#ea580c"/>
  <rect x="578" y="94" width="40" height="18" rx="5" fill="#ea580c" transform="rotate(50 598 103)"/>
  <rect x="594" y="100" width="10" height="22" rx="4" fill="#c2410c" transform="rotate(50 598 103)"/>
  <!-- Card title -->
  <text x="600" y="160" text-anchor="middle" font-size="20" font-weight="800" fill="#9a3412">Court Challan</text>
  <text x="600" y="180" text-anchor="middle" font-size="12" fill="#64748b">Magistrate-referred</text>
  <!-- Divider -->
  <line x1="465" y1="198" x2="735" y2="198" stroke="#f1f5f9" stroke-width="1.5"/>
  <!-- Rows -->
  <text x="465" y="222" font-size="12" fill="#94a3b8">Pay online</text>
  <rect x="565" y="208" width="155" height="22" rx="6" fill="#fee2e2"/>
  <text x="642" y="223" text-anchor="middle" font-size="11" font-weight="700" fill="#dc2626">No — legal needed</text>

  <text x="465" y="257" font-size="12" fill="#94a3b8">Discount possible</text>
  <rect x="615" y="243" width="55" height="22" rx="6" fill="#dcfce7"/>
  <text x="642" y="258" text-anchor="middle" font-size="11" font-weight="700" fill="#16a34a">Yes ✓</text>

  <text x="465" y="292" font-size="12" fill="#94a3b8">Complexity</text>
  <rect x="565" y="278" width="105" height="22" rx="6" fill="#fef3c7"/>
  <text x="617" y="293" text-anchor="middle" font-size="11" font-weight="700" fill="#d97706">High</text>

  <text x="465" y="327" font-size="12" fill="#94a3b8">Needs lawyer</text>
  <rect x="565" y="313" width="105" height="22" rx="6" fill="#fee2e2"/>
  <text x="617" y="328" text-anchor="middle" font-size="11" font-weight="700" fill="#dc2626">Yes — essential</text>

  <!-- Bottom tag -->
  <rect x="465" y="338" width="250" height="8" rx="4" fill="#fed7aa" opacity="0.5"/>
</svg>
