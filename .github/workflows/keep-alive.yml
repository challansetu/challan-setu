name: Keep backend warm

# Pings the backend health endpoint on a schedule so the Railway container
# doesn't go cold (which makes the first admin request slow). The endpoint is
# a cheap liveness check that does not touch the database.

on:
  schedule:
    # Every 10 minutes. GitHub may delay scheduled runs under load, and disables
    # this workflow after 60 days with no repo activity — re-enable it if that happens.
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /api/health
        env:
          # Set this in Settings → Secrets and variables → Actions → Variables,
          # e.g. https://your-service.up.railway.app
          HEALTH_URL: ${{ vars.BACKEND_HEALTH_URL }}
        run: |
          if [ -z "$HEALTH_URL" ]; then
            echo "::error::Repository variable BACKEND_HEALTH_URL is not set. Add it under Settings → Secrets and variables → Actions → Variables (e.g. https://<service>.up.railway.app)."
            exit 1
          fi

          url="${HEALTH_URL%/}/api/health"
          echo "Pinging $url"

          # Retry a few times so a single transient blip (or a cold start that is
          # waking up) doesn't fail the run.
          for attempt in 1 2 3 4 5; do
            code=$(curl -s -o /tmp/body.txt -w "%{http_code}" --max-time 30 "$url" || echo "000")
            echo "Attempt $attempt → HTTP $code"
            if [ "$code" = "200" ]; then
              cat /tmp/body.txt
              echo ""
              echo "Backend is warm."
              exit 0
            fi
            sleep 15
          done

          echo "::error::Health check did not return 200 after 5 attempts (last status: $code)."
          cat /tmp/body.txt || true
          exit 1
